# Metadata
sonar.projectKey=raio-x-do-governo
sonar.projectName=Raio-X do Governo
sonar.projectVersion=0.2.0

# Source (monorepo)
sonar.sources=apps/web/src,apps/api/src,libs
sonar.tests=apps/web/src/__tests__
sonar.test.inclusions=**/__tests__/**/*.test.ts,**/__tests__/**/*.test.tsx

# Language / Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPaths=apps/web/tsconfig.json,apps/api/tsconfig.json

# Coverage (lcov generated by vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  dist/**,\
  out/**,\
  build/**,\
  coverage/**,\
  public/**,\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/next-env.d.ts,\
  **/prisma/**,\
  docs/**

sonar.test.exclusions=\
  **/__tests__/**

# SonarQube server (local Docker)
sonar.host.url=http://sonarqube:9000
