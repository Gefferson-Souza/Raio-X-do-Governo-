# Metadata
sonar.projectKey=raio-x-do-governo
sonar.projectName=Raio-X do Governo
sonar.projectVersion=0.1.0

# Source
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts,src/__tests__/**/*.test.tsx

# Language / Encoding
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPaths=tsconfig.sonar.json

# Coverage (lcov generated by vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  out/**,\
  build/**,\
  coverage/**,\
  public/**,\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/next-env.d.ts

sonar.test.exclusions=\
  src/__tests__/**

# SonarQube server (local Docker)
sonar.host.url=http://sonarqube:9000
